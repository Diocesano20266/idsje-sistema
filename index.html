<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDSJE — Sistema Académico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box;}
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f0f4f8;
        }

        /* Panel izquierdo — decorativo */
        .panel-left {
            width: 45%;
            background: linear-gradient(160deg, #1B3A6B 0%, #0f2347 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
        }
        .panel-left::before {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.06);
            top: -100px; left: -100px;
        }
        .panel-left::after {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.04);
            bottom: -80px; right: -80px;
        }
        .logo-wrap { text-align: center; z-index: 1; }
        .logo-icon {
            width: 80px; height: 80px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }
        .logo-nombre {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .logo-sub {
            font-size: 11px;
            color: rgba(255,255,255,.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .panel-tagline {
            margin-top: 48px;
            text-align: center;
            z-index: 1;
        }
        .panel-tagline h2 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 12px;
        }
        .panel-tagline p {
            font-size: 13px;
            color: rgba(255,255,255,.5);
            line-height: 1.7;
            max-width: 280px;
        }

        /* Panel derecho — login */
        .panel-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: #1B3A6B;
            margin-bottom: 8px;
        }
        .login-sub {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 36px;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #1e293b;
            background: #fff;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus { border-color: #1B3A6B; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1B3A6B;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #2E5FAC; }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 10px;
            margin-top: 14px;
            display: none;
        }
        .footer-login {
            margin-top: 40px;
            font-size: 11px;
            color: #cbd5e1;
            text-align: center;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .panel-left { display: none; }
            .panel-right { padding: 24px; }
        }
    </style>
</head>
<body>

    <!-- Panel izquierdo -->
    <div class="panel-left">
        <div class="logo-wrap">
            <div class="logo-icon">📚</div>
            <div class="logo-nombre">IDSJE</div>
            <div class="logo-sub">Sistema Académico</div>
        </div>
        <div class="panel-tagline">
            <h2>Gestión académica moderna para el instituto</h2>
            <p>Registro de notas, competencias ciudadanas y generación automática de boletas.</p>
        </div>
    </div>

    <!-- Panel derecho -->
    <div class="panel-right">
        <div class="login-box">
            <h1 class="login-title">Bienvenido</h1>
            <p class="login-sub">Ingresá con tus credenciales institucionales</p>

            <div class="field">
                <label>Correo institucional</label>
                <input type="email" id="correo" placeholder="tu@correo.com"
                    onkeydown="if(event.key==='Enter') iniciarSesion()">
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••"
                    onkeydown="if(event.key==='Enter') iniciarSesion()">
            </div>

            <button class="btn-login" onclick="iniciarSesion()" id="btn-entrar">
                Iniciar Sesión
            </button>

            <div class="error-msg" id="error-msg"></div>

            <div class="footer-login">
                Instituto Diocesano "San Juan Evangelista"<br>
                San Juan Opico, El Salvador · 2026
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase, verificarSesion } from './src/js/auth.js';

        // Si ya hay sesión activa, redirigir
        (async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data: usuario } = await supabase
                    .from('usuarios')
                    .select('rol')
                    .eq('correo', session.user.email)
                    .single();
                if (usuario) {
                    window.location.href = usuario.rol === 'admin' ? './admin.html' : './docente.html';
                }
            }
        })();

        window.iniciarSesion = async () => {
            const correo   = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value;
            const errEl    = document.getElementById('error-msg');
            const btn      = document.getElementById('btn-entrar');
            errEl.style.display = 'none';

            if (!correo || !password) {
                errEl.textContent = 'Completá todos los campos.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            const { error } = await supabase.auth.signInWithPassword({ email: correo, password });

            if (error) {
                errEl.textContent = 'Correo o contraseña incorrectos.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
                return;
            }

            // Obtener rol
            const { data: usuario } = await supabase
                .from('usuarios')
                .select('rol')
                .eq('correo', correo)
                .single();

            if (!usuario) {
                errEl.textContent = 'Usuario no registrado en el sistema. Contactá al administrador.';
                errEl.style.display = 'block';
                await supabase.auth.signOut();
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
                return;
            }

            window.location.href = usuario.rol === 'admin' ? './admin.html' : './docente.html';
        };
    </script>
</body>
</html>
