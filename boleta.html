<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDSJE — Boletas de Notas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f3f9;color:#1e293b}

        .topbar{background:#0a1628;color:#fff;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .gold-bar{height:2.5px;background:linear-gradient(90deg,#d4af37,#f5d97a,transparent);position:sticky;top:52px;z-index:100}
        .topbar-brand{font-size:15px;font-weight:700;color:#fff}
        .topbar-brand span{color:#d4af37}
        .topbar-right{display:flex;gap:10px;align-items:center}
        .btn-imprimir{background:#d4af37;border:none;color:#0a1628;padding:9px 20px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer}
        .btn-volver{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none}
        .btn-salir{background:transparent;border:none;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer}

        .controles{max-width:900px;margin:24px auto;padding:0 24px}
        .ctrl-card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e2e8f0;display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap}
        .ctrl-field{flex:1;min-width:180px}
        .ctrl-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#64748b;margin-bottom:7px}
        .ctrl-field select{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;background:#fff;transition:border-color .2s}
        .ctrl-field select:focus{border-color:#0a1628}
        .periodos{display:flex;background:#f1f5f9;border-radius:9px;padding:3px;gap:2px}
        .periodo-btn-b{padding:7px 14px;border-radius:7px;border:none;background:transparent;font-weight:700;font-size:11px;cursor:pointer;color:#64748b;transition:all .2s}
        .periodo-btn-b.active{background:#0a1628;color:#d4af37}
        .btn-generar{background:#0a1628;color:#d4af37;border:1px solid rgba(212,175,55,.3);padding:11px 24px;border-radius:9px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s}
        .btn-generar:hover{background:#d4af37;color:#0a1628}

        .loading{text-align:center;padding:40px;color:#94a3b8;font-size:13px}
        .hidden{display:none!important}

        #contenedor-boletas{max-width:900px;margin:0 auto;padding:0 24px 40px}

        /* ── BOLETA ── */
        .boleta-page{
            background:#fff;
            margin:20px 0;
            padding:20px 24px;
            border-radius:4px;
            box-shadow:0 2px 12px rgba(0,0,0,.1);
            font-family:Arial,sans-serif;
            font-size:11px;
        }

        @media print {
            .topbar,.gold-bar,.controles,#loading-boletas{display:none!important}
            body{background:white}
            #contenedor-boletas{max-width:100%;padding:0;margin:0}
            .boleta-page{
                margin:0;
                padding:14px 18px;
                box-shadow:none;
                border-radius:0;
                page-break-after:always;
            }
            .boleta-page:last-child{page-break-after:avoid}
        }
    </style>
</head>
<body>

    <nav class="topbar">
        <div class="topbar-brand">IDSJE · <span>Boletas de Notas</span></div>
        <div class="topbar-right">
            <button class="btn-imprimir" onclick="imprimirBoletas()">🖨 Imprimir / PDF</button>
            <a href="./admin.html" class="btn-volver">← Admin</a>
            <button class="btn-salir" onclick="cerrarSesionBoleta()">Salir</button>
        </div>
    </nav>
    <div class="gold-bar"></div>

    <div class="controles">
        <div class="ctrl-card">
            <div class="ctrl-field">
                <label>Grado y Sección</label>
                <select id="sel-grado"><option value="">— Seleccionar —</option></select>
            </div>
            <div class="ctrl-field">
                <label>Periodo</label>
                <div class="periodos">
                    <button class="periodo-btn-b active" onclick="setPeriodoBoleta(1)">P1</button>
                    <button class="periodo-btn-b" onclick="setPeriodoBoleta(2)">P2</button>
                    <button class="periodo-btn-b" onclick="setPeriodoBoleta(3)">P3</button>
                    <button class="periodo-btn-b" onclick="setPeriodoBoleta(4)">P4</button>
                </div>
            </div>
            <button class="btn-generar" onclick="generarBoletas()">Generar Boletas</button>
        </div>
    </div>

    <div id="loading-boletas" class="loading hidden">⏳ Generando boletas...</div>
    <div id="contenedor-boletas"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./src/js/boleta.js"></script>
</body>
</html>
